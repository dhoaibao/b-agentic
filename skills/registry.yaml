{
  "schema_version": 1,
  "format": "json-subset-of-yaml",
  "skills": [
    {
      "name": "b-plan",
      "phase": "Decide",
      "use": "Figure out what to do when scope or approach is fuzzy, then produce an execution-ready plan",
      "command": {
        "alias": "b-plan",
        "description": "Explore unclear work and turn it into an execution-ready plan",
        "exposed": true
      },
      "routing": {
        "intent": "Clarify fuzzy work, compare approaches, decompose execution",
        "triggers": [
          "plan",
          "decompose",
          "approach",
          "explore",
          "not sure",
          "figure out",
          "\"how should I\"",
          "implementation plan",
          "clarify",
          "requirements",
          "scope"
        ]
      },
      "prompt": {
        "description": "Turn goals into execution-ready plans. Handles both underspecified requests and fuzzy problem statements by investigating enough to compare options, choose a path, and write ordered steps. Unlike b-implement, b-plan does not change code.",
        "argument_hint": "[task]"
      }
    },
    {
      "name": "b-research",
      "phase": "Decide",
      "use": "Fetch outside truth: docs, API facts, comparisons, or recent evidence",
      "command": {
        "alias": "b-research",
        "description": "Fetch outside truth from docs, APIs, and current sources",
        "exposed": true
      },
      "routing": {
        "intent": "External docs, API facts, versions, comparisons",
        "triggers": [
          "docs",
          "library",
          "API",
          "compare",
          "look up"
        ]
      },
      "prompt": {
        "description": "External knowledge, from quick lookup to multi-source synthesis, for library/framework docs, API facts, config keys, method signatures, comparisons, deep dives, or recency-sensitive topics. Auto-detects depth, answers with sources, and hands off to implementation when the next action is obvious. Unlike b-debug or b-plan, it fetches docs and web information rather than tracing code or choosing implementation.",
        "argument_hint": "[question-or-source]"
      }
    },
    {
      "name": "b-design",
      "phase": "Decide",
      "use": "Create or refresh docs/DESIGN.md as a frontend design standard",
      "command": {
        "alias": "b-design",
        "description": "Create or refresh frontend design guidance",
        "exposed": true
      },
      "routing": {
        "intent": "Frontend design standard and docs/DESIGN.md authoring",
        "triggers": [
          "DESIGN.md",
          "frontend design standard",
          "design guidelines",
          "style guide",
          "visual style",
          "visual design rules",
          "design rules",
          "from screenshot",
          "from mockup",
          "analyze mockup",
          "analyze screenshot",
          "design system docs"
        ]
      },
      "prompt": {
        "description": "Frontend design-standard authoring for creating or refreshing `docs/DESIGN.md` from user descriptions, attached images or mockups, existing frontend files, or current design docs. Use when Codex needs to extract, normalize, or rewrite shared UI style guidance for future frontend implementation. Unlike b-implement, it writes design guidance rather than UI code; unlike b-browser, it does not collect final browser evidence.",
        "argument_hint": "[design-source-or-goal]"
      }
    },
    {
      "name": "b-implement",
      "phase": "Build",
      "use": "Make the scoped change from an approved plan or a small direct request",
      "command": {
        "alias": "b-implement",
        "description": "Make the scoped change from an approved plan or direct request",
        "exposed": true
      },
      "routing": {
        "intent": "Implement approved or clearly scoped work",
        "triggers": [
          "implement",
          "add",
          "build",
          "execute",
          "finish"
        ]
      },
      "prompt": {
        "description": "Execute approved or scoped work safely after b-plan approval, when the user asks to implement scoped work, or when a direct request is small and clear. Applies the next small step, verifies it, and hands back to planning or research instead of guessing when new ambiguity appears. Unlike b-plan, b-implement changes code.",
        "argument_hint": "[plan-path-or-task]"
      }
    },
    {
      "name": "b-init",
      "phase": "Build",
      "use": "Initialize or refresh repo-local agent instruction docs",
      "command": {
        "alias": "b-init",
        "description": "Create or refresh AGENTS.md and a CLAUDE.md redirect shim",
        "exposed": true
      },
      "routing": {
        "intent": "Initialize repo-local agent instruction files",
        "triggers": [
          "/init",
          "init agent docs",
          "initialize agent docs",
          "create AGENTS.md",
          "create CLAUDE.md",
          "refresh AGENTS.md",
          "refresh agent docs"
        ]
      },
      "prompt": {
        "description": "Initialize or refresh repo-local agent instruction docs: canonical AGENTS.md plus a minimal CLAUDE.md shim that routes readers to AGENTS.md. Grounds the docs in repo evidence, preserves user-owned content, and keeps the output slim.",
        "argument_hint": "[repo-root-or-subtree]"
      }
    },
    {
      "name": "b-refactor",
      "phase": "Build",
      "use": "Rename, extract, move, inline, simplify, or delete behavior-preserving code",
      "command": {
        "alias": "b-refactor",
        "description": "Run a named behavior-preserving refactor",
        "exposed": true
      },
      "routing": {
        "intent": "Mechanical rename, extract, move, inline, simplify, delete",
        "triggers": [
          "rename",
          "extract",
          "move",
          "inline",
          "simplify",
          "delete"
        ]
      },
      "prompt": {
        "description": "Code refactoring: impact analysis, mechanical transformation, and verification for named behavior-preserving transforms: rename, extract, move, inline, delete dead code, or simplify a specific target. Vague cleanups go to b-plan first. Unlike b-plan, which decides what to build, b-refactor owns mechanical edits.",
        "argument_hint": "[refactor-target]"
      }
    },
    {
      "name": "b-debug",
      "phase": "Validate",
      "use": "Find the real runtime root cause and fix it minimally",
      "command": {
        "alias": "b-debug",
        "description": "Find the root cause of broken runtime behavior and fix it minimally",
        "exposed": true
      },
      "routing": {
        "intent": "Runtime bug, error, \"not working\"",
        "triggers": [
          "bug",
          "broken",
          "error",
          "stack trace",
          "\"not working\"",
          "regression",
          "product regression",
          "product bug"
        ]
      },
      "prompt": {
        "description": "Systematic hypothesis-driven debugging for runtime bugs, errors, broken behavior, slow paths, memory issues, and stack traces. Traces execution, confirms root cause, then fixes minimally and verifies. When the issue is not yet a confirmed product bug, it should hand off cleanly instead of guessing. Unlike b-test, b-debug owns runtime behavior failures, not test-mechanic issues such as wrong assertions, mocks, or fixtures.",
        "argument_hint": "[symptom-or-error]"
      }
    },
    {
      "name": "b-test",
      "phase": "Validate",
      "use": "Write or fix unit, integration, contract, and simulated-DOM tests",
      "command": {
        "alias": "b-test",
        "description": "Write or fix unit, integration, contract, and component tests",
        "exposed": true
      },
      "routing": {
        "intent": "Unit/integration/component tests, coverage, failing tests",
        "triggers": [
          "tests",
          "coverage",
          "failing test",
          "snapshot",
          "mock",
          "component test",
          "jsdom",
          "happy-dom",
          "React Testing Library"
        ]
      },
      "prompt": {
        "description": "Test-driven development, test debugging, and test coverage evaluation. Use for writing tests, fixing failing tests, evaluating coverage, or working TDD-style. Unlike b-debug, which traces runtime bugs, b-test owns test-specific failures and simulated-DOM/component-test work: wrong assertions, missing mocks, fixture or setup issues, and coverage gaps. Real-browser, visual, browser-session, and e2e verification belongs to b-browser.",
        "argument_hint": "[test-task-or-failure]"
      }
    },
    {
      "name": "b-browser",
      "phase": "Validate",
      "use": "Collect real-browser, visual, screenshot, live UI, or e2e evidence",
      "command": {
        "alias": "b-browser",
        "description": "Collect real-browser, visual, or e2e evidence",
        "exposed": true
      },
      "routing": {
        "intent": "Real-browser, visual, and e2e verification",
        "triggers": [
          "browser",
          "e2e",
          "visual",
          "screenshot",
          "browser session",
          "live UI",
          "Playwright",
          "Cypress e2e",
          "Puppeteer",
          "WebDriver"
        ]
      },
      "prompt": {
        "description": "Browser automation and evidence operator for Playwright, Cypress e2e, Puppeteer, WebDriver, visual, screenshot, browser-session, live UI, and e2e checks. Unlike b-test, b-browser owns real-browser UI evidence, not simulated-DOM unit, integration, or contract tests.",
        "argument_hint": "[browser-or-e2e-request]"
      }
    },
    {
      "name": "b-review",
      "phase": "Validate",
      "use": "Review changed code or run a b-agentic suite self-audit",
      "command": {
        "alias": "b-review",
        "description": "Review changed code or b-agentic suite audit",
        "exposed": true
      },
      "routing": {
        "intent": "Pre-PR changed-code review and b-agentic suite audit",
        "triggers": [
          "code review",
          "review diff",
          "review my diff",
          "review changes",
          "review these changes",
          "working tree diff",
          "pre-PR",
          "\"what would a reviewer\"",
          "b-agentic audit",
          "suite audit",
          "maintainer audit"
        ]
      },
      "prompt": {
        "description": "Pre-PR changed-code review for reviewer-style reads of a diff, commit range, or checkpoint after implementation, plus b-agentic suite self-audits when explicitly requested or invoked with `--audit-suite`. Do NOT invoke for general repo audits, UI/design review, plan review, or research synthesis review.",
        "argument_hint": "[--range=<ref>..<ref>] [--baseline=<path|url>] [--skip-tests] [--audit-suite]"
      }
    },

    {
      "name": "b-summary",
      "phase": "Ship",
      "use": "Write commit and PR copy for one cohesive staged change",
      "command": {
        "alias": "b-summary",
        "description": "Write a commit message, PR title, and PR description",
        "exposed": true
      },
      "routing": null,
      "prompt": {
        "description": "Analyze the staged changes of the current branch and write a concise Conventional Commits message, PR title, and structured PR description for one cohesive change without checking remotes or merge state.",
        "argument_hint": "[change-context]"
      }
    }
  ]
}
