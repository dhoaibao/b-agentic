{
  "schema_version": 1,
  "format": "json-subset-of-yaml",
  "description": "Canonical managed MCP operation classification. Render the kernel table and validate/generate adapter policies from this file only.",
  "classes": {
    "read-only": {
      "policy": "Autonomous when the runtime can scope tools",
      "notes": "Bounded search/extraction and observational browser evidence only."
    },
    "conditional-read": {
      "policy": "Autonomous for safe arguments",
      "notes": "Gate mutation, local access, and arbitrary output."
    },
    "local-upload": {
      "policy": "Approval required",
      "notes": "Reads local files for remote processing."
    },
    "external-mutation": {
      "policy": "Approval required",
      "notes": "Creates or changes remote state, including sessions, pages, and submitted feedback."
    },
    "monitor-lifecycle": {
      "policy": "Approval required; not part of the default workflow",
      "notes": "Firecrawl monitor create/update/delete/run/list/get/check families."
    },
    "local-mutation": {
      "policy": "Approval required",
      "notes": "Mutates local repository or agent state."
    },
    "auth": {
      "policy": "Approval required",
      "notes": "MCP OAuth/auth bootstrap actions."
    }
  },
  "servers": {
    "serena": {
      "tools": {
        "serena_search_for_pattern": "conditional-read",
        "serena_get_symbols_overview": "conditional-read",
        "serena_find_symbol": "conditional-read",
        "serena_find_referencing_symbols": "conditional-read",
        "serena_find_implementations": "conditional-read",
        "serena_find_declaration": "conditional-read",
        "serena_get_diagnostics_for_file": "conditional-read",
        "serena_read_memory": "read-only",
        "serena_list_memories": "read-only",
        "serena_initial_instructions": "read-only",
        "serena_replace_content": "local-mutation",
        "serena_replace_in_files": "local-mutation",
        "serena_replace_symbol_body": "local-mutation",
        "serena_insert_after_symbol": "local-mutation",
        "serena_insert_before_symbol": "local-mutation",
        "serena_rename_symbol": "local-mutation",
        "serena_safe_delete_symbol": "local-mutation",
        "serena_write_memory": "local-mutation",
        "serena_delete_memory": "local-mutation",
        "serena_rename_memory": "local-mutation",
        "serena_edit_memory": "local-mutation",
        "serena_open_dashboard": "external-mutation",
        "serena_onboarding": "local-mutation"
      }
    },
    "codegraph": {
      "tools": {
        "codegraph_codegraph_explore": "read-only"
      }
    },
    "context7": {
      "tools": {
        "context7_resolve-library-id": "read-only",
        "context7_query-docs": "read-only"
      }
    },
    "brave-search": {
      "tools": {
        "brave_search_brave_web_search": "read-only",
        "brave_search_brave_local_search": "read-only",
        "brave_search_brave_video_search": "read-only",
        "brave_search_brave_image_search": "read-only",
        "brave_search_brave_news_search": "read-only",
        "brave_search_brave_summarizer": "read-only",
        "brave_search_brave_llm_context": "read-only",
        "brave_search_brave_place_search": "read-only"
      }
    },
    "firecrawl": {
      "tools": {
        "firecrawl_search": "conditional-read",
        "firecrawl_scrape": "conditional-read",
        "firecrawl_map": "read-only",
        "firecrawl_extract": "read-only",
        "firecrawl_agent_status": "read-only",
        "firecrawl_check_crawl_status": "read-only",
        "firecrawl_interact_stop": "external-mutation",
        "firecrawl_research_search_papers": "read-only",
        "firecrawl_research_inspect_paper": "read-only",
        "firecrawl_research_read_paper": "read-only",
        "firecrawl_research_related_papers": "read-only",
        "firecrawl_research_search_github": "read-only",
        "firecrawl_parse": "local-upload",
        "firecrawl_agent": "external-mutation",
        "firecrawl_crawl": "external-mutation",
        "firecrawl_interact": "external-mutation",
        "firecrawl_search_feedback": "external-mutation",
        "firecrawl_feedback": "external-mutation",
        "firecrawl_monitor_create": "monitor-lifecycle",
        "firecrawl_monitor_update": "monitor-lifecycle",
        "firecrawl_monitor_delete": "monitor-lifecycle",
        "firecrawl_monitor_get": "monitor-lifecycle",
        "firecrawl_monitor_list": "monitor-lifecycle",
        "firecrawl_monitor_run": "monitor-lifecycle",
        "firecrawl_monitor_check": "monitor-lifecycle",
        "firecrawl_monitor_checks": "monitor-lifecycle"
      }
    },
    "playwright": {
      "tools": {
        "browser_snapshot": "conditional-read",
        "browser_find": "read-only",
        "browser_take_screenshot": "local-mutation",
        "browser_console_messages": "conditional-read",
        "browser_network_requests": "conditional-read",
        "browser_network_request": "conditional-read",
        "browser_wait_for": "read-only",
        "browser_navigate": "external-mutation",
        "browser_navigate_back": "read-only",
        "browser_resize": "read-only",
        "browser_hover": "read-only",
        "browser_close": "read-only",
        "browser_tabs": "conditional-read",
        "browser_click": "external-mutation",
        "browser_type": "external-mutation",
        "browser_fill_form": "external-mutation",
        "browser_press_key": "external-mutation",
        "browser_select_option": "external-mutation",
        "browser_file_upload": "external-mutation",
        "browser_drop": "external-mutation",
        "browser_drag": "external-mutation",
        "browser_evaluate": "external-mutation",
        "browser_run_code_unsafe": "external-mutation",
        "browser_handle_dialog": "external-mutation"
      }
    }
  },
  "conditional_arguments": {
    "serena:serena_search_for_pattern": {
      "known": ["substring_pattern", "context_lines_before", "context_lines_after", "paths_include_glob", "paths_exclude_glob", "relative_path", "restrict_search_to_code_files", "multiline", "max_answer_chars"]
    },
    "serena:serena_get_symbols_overview": {
      "known": ["relative_path", "depth", "max_answer_chars"]
    },
    "serena:serena_find_symbol": {
      "known": ["name_path_pattern", "depth", "relative_path", "include_body", "include_info", "include_kinds", "exclude_kinds", "substring_matching", "max_matches", "max_answer_chars"]
    },
    "serena:serena_find_referencing_symbols": {
      "known": ["name_path", "relative_path", "include_kinds", "exclude_kinds", "max_answer_chars"]
    },
    "serena:serena_find_implementations": {
      "known": ["name_path", "relative_path", "include_info", "include_kinds", "exclude_kinds", "max_answer_chars"]
    },
    "serena:serena_find_declaration": {
      "known": ["relative_path", "regex", "containing_symbol_name_path", "include_body", "include_info"]
    },
    "serena:serena_get_diagnostics_for_file": {
      "known": ["relative_path", "start_line", "end_line", "min_severity", "max_answer_chars"]
    },
    "firecrawl:firecrawl_search": {
      "known": ["query", "limit", "tbs", "filter", "location", "includeDomains", "excludeDomains", "sources", "categories", "scrapeOptions", "enterprise"]
    },
    "firecrawl:firecrawl_scrape": {
      "known": ["url", "formats", "jsonOptions", "queryOptions", "screenshotOptions", "parsers", "pdfOptions", "onlyMainContent", "redactPII", "includeTags", "excludeTags", "waitFor", "actions", "mobile", "skipTlsVerification", "removeBase64Images", "location", "storeInCache", "zeroDataRetention", "maxAge", "lockdown", "proxy", "profile"]
    },
    "playwright:browser_snapshot": {
      "known": ["target", "filename", "depth", "boxes"]
    },
    "playwright:browser_console_messages": {
      "known": ["level", "all", "filename"]
    },
    "playwright:browser_network_requests": {
      "known": ["static", "filter", "filename"]
    },
    "playwright:browser_network_request": {
      "known": ["index", "part", "filename"]
    },
    "playwright:browser_tabs": {
      "known": ["action", "index", "url"]
    }
  },
  "gateway_operations": {
    "search": "read-only",
    "describe": "read-only",
    "ui-messages": "read-only",
    "connect": "external-mutation",
    "server": "external-mutation",
    "auth-start": "auth",
    "auth-complete": "auth"
  },
  "runtime_enforcement": {
    "pi": "adapter tool_call extension with operation-level trust"
  }
}
