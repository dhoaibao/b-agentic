name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check generated assets are in sync
        run: python3 tooling/generate/registry_sync.py --check
      - name: Run validation suite
        run: bash scripts/validate-skills.sh --release
      - name: Run suite audit
        run: bash scripts/b-agentic-audit.sh
