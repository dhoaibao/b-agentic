[[permission.rules]]
decision = "deny"
pattern = "Bash(git reset --hard*)"
reason = "b-agentic never resets user work autonomously."

[[permission.rules]]
decision = "deny"
pattern = "Bash(git clean -f*)"
reason = "b-agentic never deletes untracked user work autonomously."

[[permission.rules]]
decision = "deny"
pattern = "Bash(git push --force*)"
reason = "b-agentic never force-pushes."

[[permission.rules]]
decision = "deny"
pattern = "Bash(git branch -D*)"
reason = "b-agentic never deletes branches autonomously."

[[permission.rules]]
decision = "deny"
pattern = "Bash(docker system prune*)"
reason = "b-agentic never prunes Docker resources autonomously."

[[permission.rules]]
decision = "deny"
pattern = "Bash(docker volume rm*)"
reason = "b-agentic never removes Docker volumes autonomously."

[[permission.rules]]
decision = "ask"
pattern = "Bash(git commit*)"
reason = "Commits require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(git push*)"
reason = "Pushes require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(git pull*)"
reason = "Pulls require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(git revert*)"
reason = "History-changing commands require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(npm install*)"
reason = "Dependency writes require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(pnpm install*)"
reason = "Dependency writes require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(yarn install*)"
reason = "Dependency writes require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(bun install*)"
reason = "Dependency writes require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(pip install*)"
reason = "Dependency writes require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(poetry add*)"
reason = "Dependency writes require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(cargo add*)"
reason = "Dependency writes require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(go get*)"
reason = "Dependency writes require explicit approval."

[[permission.rules]]
decision = "ask"
pattern = "Bash(rm -rf*)"
reason = "Recursive deletion requires explicit approval; temp/build cleanups are allowed when scoped."
