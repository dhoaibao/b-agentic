[mcp_servers.serena]
command = "serena"
args = ["start-mcp-server", "--context", "codex", "--project-from-cwd", "--open-web-dashboard", "false"]

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
http_headers = { CONTEXT7_API_KEY = "CONTEXT7_API_KEY" }

[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]
env = { CODEGRAPH_TELEMETRY = "0" }

[mcp_servers.brave-search]
command = "pnpm"
args = ["dlx", "@brave/brave-search-mcp-server@2.0.85", "--transport", "stdio"]
env = { BRAVE_API_KEY = "BRAVE_API_KEY" }

[mcp_servers.firecrawl]
command = "pnpm"
args = ["dlx", "firecrawl-mcp@3.22.1"]
env = { FIRECRAWL_API_KEY = "FIRECRAWL_API_KEY" }
enabled_tools = [
  "firecrawl_search",
  "firecrawl_scrape",
  "firecrawl_map",
  "firecrawl_extract",
  "firecrawl_agent_status",
  "firecrawl_check_crawl_status",
  "firecrawl_interact_stop",
  "firecrawl_research_search_papers",
  "firecrawl_research_inspect_paper",
  "firecrawl_research_read_paper",
  "firecrawl_research_related_papers",
  "firecrawl_research_search_github",
  "firecrawl_parse",
  "firecrawl_agent",
  "firecrawl_crawl",
  "firecrawl_interact",
  "firecrawl_search_feedback",
  "firecrawl_feedback",
  "firecrawl_monitor_create",
  "firecrawl_monitor_update",
  "firecrawl_monitor_delete",
  "firecrawl_monitor_get",
  "firecrawl_monitor_list",
  "firecrawl_monitor_run",
  "firecrawl_monitor_check",
  "firecrawl_monitor_checks",
]
default_tools_approval_mode = "prompt"

[mcp_servers.firecrawl.tools.firecrawl_search]
approval_mode = "approve"

[mcp_servers.firecrawl.tools.firecrawl_scrape]
approval_mode = "approve"

[mcp_servers.firecrawl.tools.firecrawl_map]
approval_mode = "approve"

[mcp_servers.firecrawl.tools.firecrawl_extract]
approval_mode = "approve"

[mcp_servers.firecrawl.tools.firecrawl_agent_status]
approval_mode = "approve"

[mcp_servers.firecrawl.tools.firecrawl_check_crawl_status]
approval_mode = "approve"

[mcp_servers.firecrawl.tools.firecrawl_interact_stop]
approval_mode = "approve"

[mcp_servers.firecrawl.tools.firecrawl_research_search_papers]
approval_mode = "approve"

[mcp_servers.firecrawl.tools.firecrawl_research_inspect_paper]
approval_mode = "approve"

[mcp_servers.firecrawl.tools.firecrawl_research_read_paper]
approval_mode = "approve"

[mcp_servers.firecrawl.tools.firecrawl_research_related_papers]
approval_mode = "approve"

[mcp_servers.firecrawl.tools.firecrawl_research_search_github]
approval_mode = "approve"

[mcp_servers.playwright]
command = "pnpm"
args = ["dlx", "@playwright/mcp@0.0.77", "--isolated"]
enabled_tools = [
  "browser_snapshot",
  "browser_take_screenshot",
  "browser_console_messages",
  "browser_network_requests",
  "browser_network_request",
  "browser_wait_for",
