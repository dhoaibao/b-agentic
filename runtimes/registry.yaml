        },
        "permissions": {
          "support": "adapter",
          "adoption": "adapter-only"
        },
        "rules": {
          "support": "unsupported",
          "adoption": "unsupported"
        },
        "command_wrappers": {
          "support": "unsupported",
          "adoption": "unsupported"
        },
        "mcp": {
          "support": "adapter",
          "adoption": "adapter-only"
        }
      },
      "command_wrappers": {
        "supported": false,
        "source_dir": null,
        "install_root": null
      }
    }
  ]
